<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>태형 & 샤론의 결혼식에 초대합니다</title>
    
    <meta property="og:title" content="태형 & 샤론의 결혼식에 초대합니다">
    <meta property="og:description" content="2026년 8월 8일, 두 사람이 새 출발을 합니다. 따뜻한 축복 부탁드립니다.">
    <meta property="og:image" content="https://your-image-url.jpg">
    <meta property="og:url" content="https://your-page-url.com">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Noto+Serif+KR:wght@400;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #f6f5f0; font-family: 'Noto Sans KR', sans-serif; color: #333333; display: flex; justify-content: center; min-height: 100vh; line-height: 1.6; }
        .wrapper { width: 100%; max-width: 450px; background-color: #ffffff; min-height: 100vh; box-shadow: 0 0 30px rgba(0, 0, 0, 0.05); padding-bottom: 60px; }
        .hero { text-align: center; padding: 80px 20px 60px 20px; background: linear-gradient(to bottom, #faf9f5 0%, #ffffff 100%); }
        .names { font-family: 'Noto Serif KR', serif; font-size: 2.4rem; color: #222222; margin-bottom: 15px; }
        .section { padding: 20px 25px; text-align: center; }
        .section-title { font-family: 'Noto Serif KR', serif; font-size: 1.3rem; color: #8a7355; margin-bottom: 25px; font-weight: 700; }
        
        /* 🌿 균일한 3봉우리 하트 애니메이션 */
        .heart-animation-wrap { display: flex; justify-content: center; margin-bottom: 25px; }
        .heart-svg { width: 220px; height: 110px; }
        .heart-trail { stroke: #8a7355; stroke-width: 2.5; fill: none; stroke-linecap: round; stroke-dasharray: 600; stroke-dashoffset: 600; animation: drawHeart 5s ease-in-out infinite; }
        .heart-leaf { fill: #8a7355; opacity: 0; animation: fadeInLeaf 5s ease-in-out infinite; }
        
        @keyframes drawHeart { 0% { stroke-dashoffset: 600; } 70% { stroke-dashoffset: 0; } 100% { stroke-dashoffset: 0; } }
        @keyframes fadeInLeaf { 0% { opacity: 0; } 30% { opacity: 1; } 90% { opacity: 1; } 100% { opacity: 0; } }

        .greeting-p { font-family: 'Noto Serif KR', serif; font-size: 1.1rem; line-height: 2.4; margin-bottom: 40px; }
        .wedding-relations { font-family: 'Noto Serif KR', serif; text-align: left; display: inline-block; }
        .relation-row { margin-bottom: 10px; }
        .relation-small { font-size: 0.9rem; color: #888; margin-left: 5px; }
        
        .info-row { display: flex; justify-content: space-between; align-items: center; padding: 14px 0; border-bottom: 1px dashed #eae6dd; }
        .btn-action-group { display: flex; gap: 6px; }
        .acc-comm-btn { text-decoration: none; background: #faf4eb; border: 1px solid #e3d7c5; width: 34px; height: 34px; border-radius: 50%; display: flex; justify-content: center; align-items: center; }
        .copy-button { background: #8a7355; color: #ffffff; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 0.85rem; }
        .accordion-btn { width: 100%; background: #faf9f6; border: 1px solid #eae6dd; padding: 16px; font-weight: 700; cursor: pointer; margin-bottom: 12px; }
        .accordion-content { display: none; padding: 0 10px; }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="hero">
        <div class="main-title">2026.08.08 오후 1시<br>시냇가푸른교회 모리아홀 3층</div>
        <div class="names">태형 & 샤론</div>
    </div>

    <div class="section">
        <div class="heart-animation-wrap">
            <svg class="heart-svg" viewBox="0 0 240 120">
                <path class="heart-trail" d="M 95,35 C 105,15 130,22 120,45 C 110,65 70,100 70,100 C 70,100 30,65 20,45 C 10,22 35,15 45,35 C 55,15 80,15 95,35 C 110,10 145,5 155,30 C 165,5 200,10 215,35 C 225,55 185,90 155,110" />
            </svg>
        </div>

        <h2 class="section-title">모시는 글</h2>
        <p class="greeting-p">하나님의 사랑 안에서 만난 두 사람이<br>이제 믿음과 신뢰로 하나의 가정을 이루려 합니다.</p>
        
        <div class="wedding-relations">
            <div class="relation-row">김진근 · 박정희 <span class="relation-small">의 장남</span> <strong>김태형</strong></div>
            <div class="relation-row">조계진 · 김성화 <span class="relation-small">의 장녀</span> <strong>조샤론</strong></div>
        </div>
    </div>

    <div class="section">
        <h2 class="section-title">마음 전하실 곳</h2>
        <button class="accordion-btn" onclick="toggleAccordion('groom-acc')">신랑측 계좌번호</button>
        <div id="groom-acc" class="accordion-content">
            <div class="info-row">
                <span><strong>김태형(신랑)</strong><br>국민은행 652702-04-348581</span>
                <div class="btn-action-group">
                    <a href="tel:010-0000-0000" class="acc-comm-btn">📞</a>
                    <a href="sms:010-0000-0000" class="acc-comm-btn">💬</a>
                    <button class="copy-button" onclick="copyText('652702-04-348581')">복사</button>
                </div>
            </div>
            </div>
    </div>
</div>

<script>
    function toggleAccordion(id) {
        var el = document.getElementById(id);
        el.style.display = (el.style.display === "block") ? "none" : "block";
    }
    function copyText(text) {
        navigator.clipboard.writeText(text).then(() => alert("복사되었습니다."));
    }
</script>
</body>
</html>
